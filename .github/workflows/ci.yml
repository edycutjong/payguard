name: PayGuard Strict CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  contracts:
    name: Foundry Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Install Dependencies
        # lib/ is git-ignored (no submodules), so deps must be fetched on the runner.
        # Pinned to the versions verified locally to keep build + gas snapshot reproducible.
        run: forge install OpenZeppelin/openzeppelin-contracts@v5.6.1 foundry-rs/forge-std@v1.16.1
      - name: Build Contracts
        run: forge build --sizes
      - name: Run Tests & Fuzzing
        run: forge test -vv
      - name: Gas Regression Check
        # Deterministic gas only. Fuzz mean/median gas is seed-dependent (variable-length
        # bytes args, vm.assume run-count drift) and not reproducible across runners, so
        # fuzz tests still run in the step above but are excluded from the gas gate.
        run: forge snapshot --check --no-match-test "testFuzz"

  backend:
    name: TypeScript Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
