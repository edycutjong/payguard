name: Release

# Automatic semantic versioning via release-please (Conventional Commits).
#
# How it works (no manual version bumps):
#   1. Every push to main, release-please maintains a "release PR" that accumulates
#      the CHANGELOG and the next SemVer from your commit messages:
#        fix: …      → patch (0.1.5 → 0.1.6)
#        feat: …     → minor (0.1.5 → 0.2.0)
#        feat!: / BREAKING CHANGE → major (0.1.5 → 1.0.0)
#   2. Merge that release PR → release-please tags v* + creates the GitHub Release,
#      then the publish job below builds, verifies, and publishes to npm (with provenance)
#      and GitHub Packages.
#
# Requires repo secret NPM_TOKEN (npmjs.com → Access Tokens → Automation).

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish @edycutjong/payguard
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      # Self-contained quality gate (TS-only — the published artifact is the
      # GuardianRail guard + MCP server, so Foundry is not needed here).
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Skill bench (8 attack vectors)
        run: npm run bench
      - name: Guard unit checks (20 edges)
        run: npm run test:guard
      - name: Build
        run: npm run build

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v6
        with:
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Packages
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
