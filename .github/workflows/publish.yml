name: Publish to npm

# Publishes @edycutjong/payguard (GuardianRail library + payguard-mcp server) to npm
# when a version tag is pushed.
#
# Release flow (run locally — versioning is deliberate, no auto-increment):
#   npm run release:patch    # 0.1.0 -> 0.1.1  (npm version patch + git push --follow-tags)
#   npm run release:minor    # 0.1.0 -> 0.2.0
#   npm run release:major    # 0.1.0 -> 1.0.0
#
# Each bumps package.json, commits, creates a v* tag, and pushes it — which triggers
# this workflow to re-verify the build and publish that exact version.
#
# Requires repo secret NPM_TOKEN (npmjs.com → Access Tokens → Automation).

on:
  push:
    tags:
      - "v*"

# Least privilege. id-token: write is required for npm provenance.
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: "Publish @edycutjong/payguard"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION."
            echo "Bump with 'npm run release:<patch|minor|major>' so the tag and package.json agree."
            exit 1
          fi
          echo "✅ Tag $GITHUB_REF_NAME matches package.json ($PKG_VERSION)"

      # Self-contained quality gate (ci.yml does not run on tags). TS-only — the published
      # artifact is the GuardianRail guard + MCP server, so Foundry is not needed here.
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Skill bench (8 attack vectors)
        run: npm run bench
      - name: Guard unit checks (20 edges)
        run: npm run test:guard
      - name: Build
        run: npm run build

      # Checks + build already ran above, so skip lifecycle scripts on publish.
      # --provenance attaches a signed build attestation (public repo + id-token above).
      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          registry-url: "https://npm.pkg.github.com"

      - name: Publish to GitHub Packages
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
